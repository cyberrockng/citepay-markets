name: Agent Heartbeat

on:
  schedule:
    # Daily at 09:00 UTC — checks liveness and x402 gating, does not generate receipts
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    name: Check liveness + x402 gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify x402 gate returns 402 (no payment sent)
        run: |
          echo "Checking x402 gate — expect HTTP 402..."

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.CITEPAY_URL }}/api/ask" \
            -H "Content-Type: application/json" \
            -d '{"query":"What is x402?"}' \
            --max-time 30)

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "402" ]; then
            echo "Expected 402 Payment Required but got $HTTP_CODE"
            exit 1
          fi
          echo "x402 gate confirmed — returns 402 without payment header"

      - name: Check traction endpoint
        run: |
          TRACTION=$(curl -s "${{ secrets.CITEPAY_URL }}/api/traction" --max-time 15)
          PAID=$(echo "$TRACTION" | jq '.stats.paidCitations // 0')
          TOTAL=$(echo "$TRACTION" | jq '.stats.totalQueries // 0')
          echo "Traction: $PAID paid citations across $TOTAL queries"

      - name: Verify MCP server responds
        run: |
          MCP=$(curl -s -X POST "${{ secrets.CITEPAY_URL }}/api/mcp" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":1}' \
            --max-time 15)
          TOOL_COUNT=$(echo "$MCP" | jq '.result.tools | length // 0')
          echo "MCP tools available: $TOOL_COUNT"
          if [ "$TOOL_COUNT" -lt "3" ]; then
            echo "Expected at least 3 MCP tools"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### Agent Heartbeat — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- x402 gate: active (returns 402 without payment)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Traction endpoint: healthy" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP server: healthy (3+ tools)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Live at: ${{ secrets.CITEPAY_URL }}" >> "$GITHUB_STEP_SUMMARY"
