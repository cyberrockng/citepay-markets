name: Agent Heartbeat

on:
  schedule:
    # Every 6 hours — keeps Arc receipts accumulating, proves live system
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: "Query to run (default: What is x402?)"
        required: false
        default: "What is x402 and why do AI agents need it?"

jobs:
  heartbeat:
    name: Run citation query + verify receipts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run citation query via /api/ask
        id: query
        run: |
          QUERY="${{ github.event.inputs.query || 'What is x402 and why do AI agents need it?' }}"
          echo "Running query: $QUERY"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.CITEPAY_URL }}/api/ask" \
            -H "Content-Type: application/json" \
            -H "X-PAYMENT: heartbeat-${{ github.run_id }}" \
            -d "{\"query\":\"$QUERY\",\"budget\":0.05,\"policy\":\"balanced\"}" \
            --max-time 60)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" | jq '{queryId,totalPaid,paidCitations:.decisions|map(select(.decision=="PAY"))|length,stoppedEarly}' 2>/dev/null || echo "$BODY"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Accept 200 (real payment) or 402 (no payment header, expected in CI)
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "402" ]; then
            echo "Unexpected HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Check traction endpoint
        run: |
          TRACTION=$(curl -s "${{ secrets.CITEPAY_URL }}/api/traction" --max-time 15)
          PAID=$(echo "$TRACTION" | jq '.paidCitations // 0')
          TOTAL=$(echo "$TRACTION" | jq '.totalQueries // 0')
          echo "Traction: $PAID paid citations across $TOTAL queries"

      - name: Verify MCP server responds
        run: |
          MCP=$(curl -s -X POST "${{ secrets.CITEPAY_URL }}/api/mcp" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":1}' \
            --max-time 15)
          TOOL_COUNT=$(echo "$MCP" | jq '.result.tools | length // 0')
          echo "MCP tools available: $TOOL_COUNT"
          if [ "$TOOL_COUNT" -lt "3" ]; then
            echo "Expected at least 3 MCP tools"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### Agent Heartbeat — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Query endpoint: healthy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Traction endpoint: healthy" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP server: healthy (3+ tools)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Live at: ${{ secrets.CITEPAY_URL }}" >> "$GITHUB_STEP_SUMMARY"
