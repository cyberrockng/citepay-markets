name: Publish Receipt Digest

on:
  schedule:
    # Daily at 00:00 UTC — publish a digest of yesterday's receipts to prove traction
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  digest:
    name: Fetch + summarise citation receipts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch traction snapshot
        id: traction
        run: |
          TRACTION=$(curl -s "${{ secrets.CITEPAY_URL }}/api/traction" --max-time 30)
          echo "traction<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TRACTION" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          PAID=$(echo "$TRACTION" | jq '.paidCitations // 0')
          ROUTED=$(echo "$TRACTION" | jq '.totalUSDCRouted // 0')
          QUERIES=$(echo "$TRACTION" | jq '.totalQueries // 0')
          CREATORS=$(echo "$TRACTION" | jq '.creatorsPaid // 0')

          echo "paid=$PAID" >> "$GITHUB_OUTPUT"
          echo "routed=$ROUTED" >> "$GITHUB_OUTPUT"
          echo "queries=$QUERIES" >> "$GITHUB_OUTPUT"
          echo "creators=$CREATORS" >> "$GITHUB_OUTPUT"

      - name: Verify on-chain anchoring is current
        run: |
          # Check that ArcScan shows recent CitationPaid events for our contract
          echo "Contract: 0x396cf1646EbAeF85ee8428C2d9239C46Ae956085"
          echo "Explorer: https://testnet.arcscan.app/address/0x396cf1646EbAeF85ee8428C2d9239C46Ae956085"
          echo "Verifying /api/receipts returns valid data..."

          RECEIPTS=$(curl -s "${{ secrets.CITEPAY_URL }}/api/receipts?limit=5" --max-time 15)
          COUNT=$(echo "$RECEIPTS" | jq 'if type=="array" then length elif .receipts then .receipts|length else 0 end')
          echo "Recent receipts available: $COUNT"

      - name: Write job summary
        run: |
          echo "## CitePay Receipt Digest — $(date -u '+%Y-%m-%d')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Paid citations | ${{ steps.traction.outputs.paid }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total queries | ${{ steps.traction.outputs.queries }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Creators paid | ${{ steps.traction.outputs.creators }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| USDC routed (micro) | ${{ steps.traction.outputs.routed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "On-chain: [ArcScan](https://testnet.arcscan.app/address/0x396cf1646EbAeF85ee8428C2d9239C46Ae956085)" >> "$GITHUB_STEP_SUMMARY"
          echo "Live app: ${{ secrets.CITEPAY_URL }}" >> "$GITHUB_STEP_SUMMARY"
